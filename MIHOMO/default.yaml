# ВНИМАНИЕ! ЭТО БЕТА
# НЕ ДЛЯ REMNAWAVE, А ДЛЯ РУЧНОЙ ВСТАВКИ!
proxy-providers:
  prov:
    type: http
    url: <ВВЕДИТЕ URL ПОДПИСКИ> # в формате mihomo
    path: ./provider/proxies.yaml
    interval: 86400
# Если нет ссылки - удалите блок выше, расскоментируйте блок ниже и заполните
# можете воспользоваться конвертером https://dikozimpact.github.io/clash-convertor/
#proxies:
#- name: <PROXYNAME> (EXAMPLE)
#  type: vless
#  server: <server address>
#  port: 443
#  ip-version: ipv4
#  uuid: <uuid>
#  network: tcp
#  tls: true
#  udp: true
#  flow: xtls-rprx-vision
#  servername: <servername>
#  reality-opts:
#    public-key: <public key>
#    short-id: <shot id>
#    support-x25519mlkem768: true
#  client-fingerprint: chrome
#- name: <Another name>
mixed-port: 7890
mode: rule
log-level: silent
allow-lan: false
ipv6: true
unified-delay: true
tcp-concurrent: true
tun:
  enable: true
  stack: system
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
  - any:53
  strict-route: true
  route-exclude-address:
  - 224.0.0.0/3
  - 10.0.0.0/8
  - 127.0.0.0/8
  - 100.64.0.0/10
  - 172.16.0.0/12
  - 169.254.0.0/16
  - 192.168.0.0/16
  - 192.0.0.0/24
  - 192.0.2.0/24
  - 192.88.99.0/24
  - 198.51.100.0/24
  - 203.0.113.0/24
  - fc00::/7
  - ff00::/8
  - fe80::/10
  - ::/127
dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - rule-set:private-domains
  default-nameserver:
  - https://77.88.8.8/dns-query
  - https://8.8.8.8/dns-query
  proxy-server-nameserver:
  - https://77.88.8.8/dns-query
  - https://8.8.8.8/dns-query
  direct-nameserver:
  - https://77.88.8.8/dns-query
  - https://8.8.8.8/dns-query
  nameserver:
  - https://8.8.8.8/dns-query#PROXY
sniffer:
  enable: true
  override-destination: false
  parse-pure-ip: true
  sniff:
    HTTP:
      ports:
      - 80
      - 8080-8880
    TLS:
      ports:
      - 443
      - 8443
  skip-dst-address:
  - 224.0.0.0/3
  - 10.0.0.0/8
  - 127.0.0.0/8
  - 100.64.0.0/10
  - 172.16.0.0/12
  - 198.18.0.0/15
  - 169.254.0.0/16
  - 192.168.0.0/16
  - 192.0.0.0/24
  - 192.0.2.0/24
  - 192.88.99.0/24
  - 198.51.100.0/24
  - 203.0.113.0/24
  - fc00::/7
  - ff00::/8
  - fe80::/10
  - ::/127
find-process-mode: strict
profile:
  store-selected: true
  store-fake-ip: true
proxy-groups:
- name: 🛡️ VPN
  icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Hijacking.png
  type: select
  proxies:
  - ⚡️ Авто
  include-all: true
  url: https://www.gstatic.com/generate_204
- name: 📺 Youtube
  icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/YouTube.png
  type: select
  include-all: true
  proxies:
    - 🛡️ VPN
- name: 💬 Discord.exe
  icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Discord.png
  type: select
  include-all: true
  proxies:
  - 🛡️ VPN
- name: 🎮 Игры
  icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Game.png
  type: select
  include-all: true
  proxies:
  - 🔓 Без VPN
  - 🛡️ VPN
- name: ⚡️ Авто
  type: url-test
  tolerance: 150
  url: https://www.gstatic.com/generate_204
  interval: 300
  include-all: true
  hidden: true
- name: PROXY
  type: select
  hidden: true
  proxies:
  - 🛡️ VPN
- name: 🔓 Без VPN
  type: select
  hidden: true
  proxies:
  - DIRECT
- name: ⛔ Блок
  type: select
  hidden: true
  proxies:
  - REJECT
- name: ⏭️ Пропуск
  type: select
  hidden: true
  proxies:
  - PASS
